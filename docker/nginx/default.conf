server {
    listen 80;
    server_name localhost 192.168.100.54;
    root /var/www/public;
    index index.php index.html;

    # ===== PERFORMANCE OPTIMIZATIONS =====
    # Increase timeouts to prevent 504 errors
    fastcgi_read_timeout 600s;
    fastcgi_connect_timeout 600s;
    fastcgi_send_timeout 600s;
    proxy_read_timeout 600s;
    
    # Increase buffer sizes for large responses
    fastcgi_buffer_size 128k;
    fastcgi_buffers 4 256k;
    fastcgi_busy_buffers_size 256k;
    fastcgi_temp_file_write_size 256k;

    # Enable Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json application/javascript;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 600s;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }

    # Cache static assets for 1 year
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}