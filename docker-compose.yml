# =============================================================
# Docker Compose - EasyStock Pharmacy System
# Development Environment
# =============================================================
# Usage:
#   docker compose up -d          Start all services
#   docker compose down           Stop all services
#   docker compose logs -f        Tail logs
#   docker compose ps             List running containers
# =============================================================

services:

  # ── PHP Backend ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: easystock_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - easystock_network
    depends_on:
      - mysql

  # ── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: easystock_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - easystock_network
    depends_on:
      - backend

  # ── MySQL Database ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: easystock_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
     
     
    ports:
      - "3307:3306"
    volumes:
      - easystock_mysql_data:/var/lib/mysql
    networks:
      - easystock_network

# ----------------------------
# Networks
# ----------------------------
networks:
  easystock_network:
    driver: bridge
    name: easystock_network

# ----------------------------
# Volumes
# ----------------------------
volumes:
  easystock_mysql_data: